<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logout</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        .message-box {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 300px;
        }

        .message-box h1 {
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        .confirm-button {
            background-color: #00509E;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            display: inline-block;
            margin-top: 20px;
            float: right;
        }

        .confirm-button:hover {
            background-color: #003366;
        }
    </style>
</head>
<body>
    <div class="message-box">
        <h1>Log Out Successful</h1>
        <a href="login.html" class="confirm-button">Confirm</a>
    </div>
</body>
</html>
